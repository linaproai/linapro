# Host-only artifact smoke test composite action.
# Boots the compiled backend binary in single-node mode and validates login, system info, and plugin endpoints.
# 宿主模式构建产物冒烟测试复合操作。
# 以单节点模式启动编译后的后端二进制文件，校验登录、系统信息和插件列表等核心接口。
name: Host-only Artifact Smoke
description: Start a host-only backend artifact in Linux GitHub Actions jobs and verify core endpoints.

# Path overrides let callers reuse this action for different build profiles.
# 路径覆盖参数允许调用方为不同构建配置复用本操作。
inputs:
  binary-path:
    description: Path to the built LinaPro backend artifact.
    required: false
    default: temp/host-only-output/lina
  log-path:
    description: Path for the backend smoke log.
    required: false
    default: temp/host-only-smoke/lina-core.log
  backend-port:
    description: TCP port the host-only backend listens on; must match server.address in apps/lina-core/manifest/config/config.yaml.
    required: false
    default: "9120"

runs:
  using: composite
  steps:
    # Start the binary, poll login/system-info readiness, then verify plugin list responses.
    # 启动二进制文件，轮询登录和系统信息就绪状态，然后验证插件列表响应。
    - name: Run Host-only Artifact Smoke
      shell: bash
      env:
        BINARY_PATH: ${{ inputs.binary-path }}
        LOG_PATH: ${{ inputs.log-path }}
        BACKEND_PORT: ${{ inputs.backend-port }}
      run: |
        # Resolve relative paths against the workspace root.
        # 将相对路径解析为基于工作区根目录的绝对路径。
        case "${BINARY_PATH}" in
          /*) binary_abs="${BINARY_PATH}" ;;
          *) binary_abs="${GITHUB_WORKSPACE}/${BINARY_PATH}" ;;
        esac
        case "${LOG_PATH}" in
          /*) log_abs="${LOG_PATH}" ;;
          *) log_abs="${GITHUB_WORKSPACE}/${LOG_PATH}" ;;
        esac

        # Ensure the log directory exists and register a cleanup trap for the backend process.
        # 确保日志目录存在，并注册清理钩子以在脚本退出时终止后端进程。
        mkdir -p "$(dirname "${log_abs}")"
        backend_pid=""
        cleanup() {
          if [ -n "${backend_pid}" ] && kill -0 "${backend_pid}" 2>/dev/null; then
            kill "${backend_pid}" 2>/dev/null || true
            wait "${backend_pid}" 2>/dev/null || true
          fi
        }
        trap cleanup EXIT INT TERM

        # Launch the backend binary from the lina-core app directory, redirecting output to the log file.
        # 从 lina-core 应用目录启动后端二进制文件，将输出重定向到日志文件。
        pushd apps/lina-core >/dev/null
        "${binary_abs}" > "${log_abs}" 2>&1 &
        backend_pid="$!"
        popd >/dev/null

        # Poll login and the protected system-info endpoint for up to 90 seconds,
        # expecting single-node host-only mode.
        # 最多 90 秒轮询登录和受保护的系统信息接口，期望返回单节点宿主模式。
        sysinfo_response=""
        token=""
        for _ in $(seq 1 90); do
          if ! kill -0 "${backend_pid}" 2>/dev/null; then
            echo "Host-only backend exited before readiness check passed" >&2
            echo "Check log: ${LOG_PATH}" >&2
            exit 1
          fi
          login_response="$(
            curl -fsS \
              -H "Content-Type: application/json" \
              -d '{"username":"admin","password":"admin123","clientType":"web"}' \
              "http://127.0.0.1:${BACKEND_PORT}/api/v1/auth/login" 2>/dev/null || true
          )"
          if [ -n "${login_response}" ]; then
            token="$(LOGIN_RESPONSE="${login_response}" python3 - <<'PY'
        import json
        import os

        payload = json.loads(os.environ["LOGIN_RESPONSE"])
        data = payload.get("data", payload)
        if payload.get("code", 0) == 0 and data.get("accessToken"):
            print(data["accessToken"])
        PY
            )"
          fi
          if [ -n "${token}" ]; then
            sysinfo_response="$(
              curl -fsS \
                -H "Authorization: Bearer ${token}" \
                "http://127.0.0.1:${BACKEND_PORT}/api/v1/system/info" 2>/dev/null || true
            )"
          fi
          if [ -n "${sysinfo_response}" ] && SYSINFO_RESPONSE="${sysinfo_response}" python3 - <<'PY'
        import json
        import os
        import sys

        payload = json.loads(os.environ["SYSINFO_RESPONSE"])
        data = payload.get("data", payload)
        coordination = data.get("coordination") or {}
        if (
            payload.get("code", 0) == 0
            and coordination.get("clusterEnabled") is False
            and coordination.get("primary") is True
        ):
            sys.exit(0)
        sys.exit(1)
        PY
          then
            break
          fi
          sleep 1
        done

        # Fail fast if system-info readiness never succeeded.
        # 如果系统信息就绪检查始终未成功则立即失败。
        if [ -z "${sysinfo_response}" ]; then
          echo "Host-only backend did not return a system info response" >&2
          echo "Check log: ${LOG_PATH}" >&2
          exit 1
        fi

        # Validate the final system-info response payload in detail.
        # 详细校验最终的系统信息响应载荷。
        SYSINFO_RESPONSE="${sysinfo_response}" python3 - <<'PY'
        import json
        import os

        payload = json.loads(os.environ["SYSINFO_RESPONSE"])
        data = payload.get("data", payload)
        if payload.get("code", 0) != 0:
            raise SystemExit(f"system info business code is not zero: {payload!r}")
        coordination = data.get("coordination") or {}
        if coordination.get("clusterEnabled") is not False:
            raise SystemExit(f"expected host-only clusterEnabled=false, got: {payload!r}")
        if coordination.get("primary") is not True:
            raise SystemExit(f"expected host-only primary=true, got: {payload!r}")
        PY

        # Verify that no source plugins are loaded in host-only mode.
        # 验证宿主模式下未加载任何源码插件。
        plugins_response="$(
          curl -fsS \
            -H "Authorization: Bearer ${token}" \
            "http://127.0.0.1:${BACKEND_PORT}/api/v1/plugins?type=source"
        )"
        PLUGINS_RESPONSE="${plugins_response}" python3 - <<'PY'
        import json
        import os

        payload = json.loads(os.environ["PLUGINS_RESPONSE"])
        data = payload.get("data", payload)
        if payload.get("code", 0) != 0:
            raise SystemExit(f"plugin list business code is not zero: {payload!r}")
        plugin_items = data.get("list") or []
        if plugin_items:
            raise SystemExit(f"expected no source plugins in host-only artifact, got: {plugin_items!r}")
        if data.get("total", 0) != 0:
            raise SystemExit(f"expected source plugin total=0 in host-only artifact, got: {payload!r}")
        PY
