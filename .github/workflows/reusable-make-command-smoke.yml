# Reusable LinaPro root make command smoke workflow.
# LinaPro 可复用根目录 make 指令冒烟工作流。
name: Reusable Make Command Smoke

on:
  # Expose common root make command checks as a reusable workflow.
  # 将常用根目录 make 指令检查暴露为可复用工作流。
  workflow_call:

# Root make command smoke checks only need read access to repository contents.
# 根目录 make 指令冒烟检查只需要读取仓库内容。
permissions:
  contents: read

# Keep command logs and database timestamps aligned with the project timezone.
# 让命令日志和数据库时间戳与项目时区保持一致。
env:
  TZ: "Asia/Shanghai"

jobs:
  # Verifies frequently used root make targets that are not covered by plugin smoke.
  # 验证插件冒烟之外的常用根目录 make 指令。
  make-command-smoke:
    name: Make command smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      # Provides the database used by make db.init and make db.mock smoke checks.
      # 提供 make db.init 与 make db.mock 冒烟检查使用的数据库。
      postgres:
        image: postgres:14-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: linapro
          TZ: Asia/Shanghai
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      # Check out repository sources for root make target smoke checks.
      # 拉取仓库源码，用于根目录 make 指令冒烟检查。
      - name: Checkout Repository
        uses: actions/checkout@v5

      # Install Go so root make targets can execute linactl and the backend.
      # 安装 Go，使根目录 make 指令可以执行 linactl 与后端。
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: false

      # Verify asset packing and database bootstrap commands through the public root make entrypoint.
      # 通过公开根目录 make 入口验证资源打包、数据库初始化和 mock 数据命令。
      - name: Verify Database Make Commands
        run: |
          cp apps/lina-core/manifest/config/config.template.yaml apps/lina-core/manifest/config/config.yaml
          make pack.assets
          make db.init confirm=init
          make db.mock confirm=mock

      # Verify dev/status/stop through an isolated repository fixture with lightweight services.
      # 使用轻量服务 fixture 隔离验证 dev/status/stop 指令。
      - name: Verify Dev Lifecycle Make Commands
        run: |
          set -euo pipefail

          smoke_root="$RUNNER_TEMP/dev-command-root"
          backend_port=18080
          frontend_port=15666

          mkdir -p "$smoke_root/hack/tools" "$smoke_root/apps/lina-core" "$smoke_root/apps/lina-core/manifest/config" "$smoke_root/apps/lina-core/manifest/sql" "$smoke_root/apps/lina-core/manifest/i18n/en-US" "$smoke_root/apps/lina-core/internal/packed/manifest" "$smoke_root/apps/lina-vben/node_modules/vite/bin" "$smoke_root/apps/lina-vben/apps/web-antd"
          cp Makefile "$smoke_root/Makefile"
          cp -R hack/makefiles "$smoke_root/hack/makefiles"
          cp -R hack/tools/linactl "$smoke_root/hack/tools/linactl"
          cp apps/lina-core/go.mod "$smoke_root/apps/lina-core/go.mod"
          cp apps/lina-core/go.sum "$smoke_root/apps/lina-core/go.sum"
          cp -R apps/lina-core/api "$smoke_root/apps/lina-core/api"
          cp -R apps/lina-core/pkg "$smoke_root/apps/lina-core/pkg"
          cat > "$smoke_root/go.work" <<'WORK'
          go 1.25.0

          use (
            ./apps/lina-core
            ./hack/tools/linactl
          )
          WORK
          cat > "$smoke_root/apps/lina-core/main.go" <<'GO'
          package main

          import (
            "fmt"
            "net/http"
          )

          func main() {
            if err := http.ListenAndServe(":18080", http.HandlerFunc(func(w http.ResponseWriter, _ *http.Request) {
              _, _ = fmt.Fprintln(w, "backend ok")
            })); err != nil {
              panic(err)
            }
          }
          GO
          cat > "$smoke_root/apps/lina-core/manifest/config/config.template.yaml" <<'YAML'
          template: true
          YAML
          # Minimal config/vite fixtures aligned to the sandbox override ports
          # (LINA_CORE_PORT=18080 / LINA_VBEN_PORT=15666). The stub backend
          # listens on :18080; linactl readiness probes that same port when the
          # make variables are passed correctly.
          # 沙盒覆盖端口（LINA_CORE_PORT=18080 / LINA_VBEN_PORT=15666）对应的
          # 最小配置与 vite 桩；stub 后端监听 :18080，make 变量正确传入后
          # linactl 就绪探测也会命中同一端口。
          cat > "$smoke_root/apps/lina-core/manifest/config/config.yaml" <<'YAML'
          server:
            address: ":18080"
          YAML
          cat > "$smoke_root/apps/lina-vben/apps/web-antd/vite.config.mts" <<'TS'
          // Minimal vite config for the make-command-smoke sandbox fixture.
          // 仅用于 make-command-smoke 沙盒 fixture 的最小 vite 配置。
          export default {
            server: {
              proxy: {
                '/api': { target: 'http://localhost:18080' },
              },
            },
          };
          TS
          cat > "$smoke_root/apps/lina-core/manifest/config/metadata.yaml" <<'YAML'
          framework:
            version: v0.0.0
          YAML
          echo "select 1;" > "$smoke_root/apps/lina-core/manifest/sql/001.sql"
          echo "{}" > "$smoke_root/apps/lina-core/manifest/i18n/en-US/framework.json"
          cat > "$smoke_root/apps/lina-vben/node_modules/vite/bin/vite.js" <<'JS'
          const http = require('node:http');

          const portIndex = process.argv.indexOf('--port');
          const hostIndex = process.argv.indexOf('--host');
          const port = portIndex >= 0 ? Number(process.argv[portIndex + 1]) : 15666;
          const host = hostIndex >= 0 ? process.argv[hostIndex + 1] : '127.0.0.1';

          http.createServer((_request, response) => {
            response.end('frontend ok\n');
          }).listen(port, host);
          JS

          # Port overrides must use Makefile variable names LINA_CORE_PORT /
          # LINA_VBEN_PORT (renamed from BACKEND_PORT / FRONTEND_PORT). Stale
          # names are ignored and linactl falls back to defaults 9120/5666,
          # which do not match the stub listener on :18080.
          # 端口覆盖必须使用 Makefile 变量名 LINA_CORE_PORT / LINA_VBEN_PORT
          #（已从 BACKEND_PORT / FRONTEND_PORT 重命名）。旧变量名会被忽略，
          # linactl 回落到默认 9120/5666，与 stub 监听的 :18080 不一致。
          make -C "$smoke_root" dev plugins=0 LINA_CORE_PORT="$backend_port" LINA_VBEN_PORT="$frontend_port"
          make -C "$smoke_root" status LINA_CORE_PORT="$backend_port" LINA_VBEN_PORT="$frontend_port" | tee "$RUNNER_TEMP/dev-status.txt"
          grep -q "Lina Core" "$RUNNER_TEMP/dev-status.txt"
          grep -q "Lina Vben" "$RUNNER_TEMP/dev-status.txt"
          make -C "$smoke_root" stop LINA_CORE_PORT="$backend_port" LINA_VBEN_PORT="$frontend_port"
          test ! -f "$smoke_root/temp/pids/lina-core.pid"
          test ! -f "$smoke_root/temp/pids/lina-vben.pid"

      # Verify wasm through a real isolated dynamic plugin build and artifact assertion.
      # 通过真实隔离动态插件构建和产物断言验证 wasm 指令。
      - name: Verify Wasm Make Command
        run: |
          set -euo pipefail

          smoke_root="$RUNNER_TEMP/wasm-command-root"

          mkdir -p "$smoke_root/hack/tools" "$smoke_root/apps/lina-core" "$smoke_root/apps/lina-plugins/demo-dynamic"
          cp Makefile "$smoke_root/Makefile"
          cp -R hack/makefiles "$smoke_root/hack/makefiles"
          cp -R hack/tools/linactl "$smoke_root/hack/tools/linactl"
          cp apps/lina-core/go.mod "$smoke_root/apps/lina-core/go.mod"
          cp apps/lina-core/go.sum "$smoke_root/apps/lina-core/go.sum"
          cp -R apps/lina-core/api "$smoke_root/apps/lina-core/api"
          cp -R apps/lina-core/pkg "$smoke_root/apps/lina-core/pkg"
          cat > "$smoke_root/go.work" <<'WORK'
          go 1.25.0

          use (
            ./apps/lina-core
            ./hack/tools/linactl
          )
          WORK
          cat > "$smoke_root/apps/lina-plugins/demo-dynamic/plugin.yaml" <<'YAML'
          id: demo-dynamic
          name: Demo Dynamic
          version: v0.1.0
          type: dynamic
          scope_nature: tenant_aware
          supports_multi_tenant: false
          default_install_mode: global
          YAML

          make -C "$smoke_root" wasm p=demo-dynamic | tee "$RUNNER_TEMP/wasm-build.txt"
          grep -q "Building dynamic wasm plugin: demo-dynamic" "$RUNNER_TEMP/wasm-build.txt"
          grep -q "built runtime artifact:" "$RUNNER_TEMP/wasm-build.txt"
          test -f "$smoke_root/temp/output/demo-dynamic.wasm"
