# Reusable LinaPro Go unit test workflow.
name: Reusable Backend Unit Tests

on:
  workflow_call:

permissions:
  contents: read

env:
  TZ: "Asia/Shanghai"

jobs:
  backend-unit-tests:
    name: Go unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 120

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: 12345678
          MYSQL_DATABASE: linapro
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -uroot -p12345678"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Setup Timezone
        uses: szenius/set-timezone@v2.0
        with:
          timezoneLinux: "Asia/Shanghai"

      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: "**/go.sum"

      - name: Initialize Database Schema
        run: |
          cp apps/lina-core/manifest/config/config.template.yaml apps/lina-core/manifest/config/config.yaml
          make init confirm=init

      - name: Prepare Packed Assets
        run: |
          make -C apps/lina-core prepare-packed-assets

      - name: Run Go Unit Tests
        run: |
          module_file="$(mktemp)"
          go list -m -f '{{.Dir}}' > "${module_file}"

          if [ ! -s "${module_file}" ]; then
            echo "No Go workspace modules discovered"
            exit 1
          fi

          while IFS= read -r module_dir; do
            if [ -z "${module_dir}" ]; then
              continue
            fi
            echo "==> go test -race ${module_dir}"
            (cd "${module_dir}" && go test -race -v ./...)
          done < "${module_file}"
