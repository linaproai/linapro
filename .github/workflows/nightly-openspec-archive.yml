# LinaPro nightly OpenSpec archive and consolidation workflow.
# GitHub cron uses UTC. 21:30 UTC is 05:30 Asia/Shanghai.
name: Nightly OpenSpec Archive

on:
  schedule:
    - cron: "30 21 * * *"

  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "${{ github.workflow }} @ ${{ github.ref }}"
  cancel-in-progress: false

env:
  TZ: "Asia/Shanghai"
  OPENSPEC_VERSION: "1.3.1"

jobs:
  nightly-openspec-archive:
    name: Archive and consolidate completed OpenSpec changes
    runs-on: ubuntu-latest
    timeout-minutes: 120
    if: ${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}

    steps:
      - name: Setup Timezone
        run: |
          sudo ln -snf /usr/share/zoneinfo/Asia/Shanghai /etc/localtime
          echo Asia/Shanghai | sudo tee /etc/timezone

      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "23"

      - name: Detect Completed OpenSpec Changes
        id: detect
        run: |
          npx -y "@fission-ai/openspec@${OPENSPEC_VERSION}" list --json > "${RUNNER_TEMP}/openspec-changes.json"

          node <<'NODE'
          const fs = require('node:fs');

          const data = JSON.parse(fs.readFileSync(`${process.env.RUNNER_TEMP}/openspec-changes.json`, 'utf8'));
          const changes = Array.isArray(data.changes) ? data.changes : [];
          const completedStatuses = new Set(['complete', 'completed', 'done']);
          const candidates = changes.filter((change) => completedStatuses.has(String(change.status || '').toLowerCase()));

          fs.appendFileSync(process.env.GITHUB_OUTPUT, `has_candidates=${candidates.length > 0}\n`);
          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, `Detected ${candidates.length} completed OpenSpec change candidate(s).\n`);

          for (const change of candidates) {
            const completed = Number.isInteger(change.completedTasks) ? change.completedTasks : 'unknown';
            const total = Number.isInteger(change.totalTasks) ? change.totalTasks : 'unknown';
            console.log(`Candidate: ${change.name} status=${change.status} tasks=${completed}/${total}`);
          }
          NODE

      - name: Skip When No Completed Changes Exist
        if: ${{ steps.detect.outputs.has_candidates != 'true' }}
        run: |
          echo "No completed active OpenSpec changes found. Nothing to archive."

      - name: Prepare Codex Runtime
        if: ${{ steps.detect.outputs.has_candidates == 'true' }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
        run: |
          if [ -z "${OPENAI_API_KEY}" ]; then
            echo "OPENAI_API_KEY secret is not configured." >&2
            exit 1
          fi
          if [ -z "${OPENAI_BASE_URL}" ]; then
            echo "OPENAI_BASE_URL secret is not configured." >&2
            exit 1
          fi

          codex_home="${RUNNER_TEMP}/codex-home"
          codex_bin="${RUNNER_TEMP}/codex-bin"
          mkdir -p "${codex_home}" "${codex_bin}"
          cp .github/codex/config.toml "${codex_home}/config.toml"

          CODEX_HOME="${codex_home}" python3 <<'PY'
          import json
          import os
          from pathlib import Path

          codex_home = Path(os.environ["CODEX_HOME"])
          api_key = os.environ["OPENAI_API_KEY"]
          base_url = os.environ["OPENAI_BASE_URL"]
          config_path = codex_home / "config.toml"
          config_text = config_path.read_text(encoding="utf-8")
          config_path.write_text(
              config_text.replace('"${OPENAI_BASE_URL}"', json.dumps(base_url)),
              encoding="utf-8",
          )
          (codex_home / "auth.json").write_text(
              json.dumps({"OPENAI_API_KEY": api_key}, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )
          PY

          chmod 600 "${codex_home}/auth.json"

          cat > "${codex_bin}/openspec" <<'SH'
          #!/usr/bin/env sh
          exec npx -y "@fission-ai/openspec@${OPENSPEC_VERSION:-1.3.1}" "$@"
          SH
          chmod +x "${codex_bin}/openspec"

          {
            echo "CODEX_HOME=${codex_home}"
            echo "CODEX_BIN=${codex_bin}"
          } >> "${GITHUB_ENV}"

      - name: Run Lina Auto Archive
        if: ${{ steps.detect.outputs.has_candidates == 'true' }}
        run: |
          mkdir -p "${RUNNER_TEMP}/codex-logs"

          mkdir -p "${CODEX_HOME}/npm-cache"

          docker run --rm -i \
            --user "$(id -u):$(id -g)" \
            -e CODEX_HOME=/tmp/codex-home \
            -e HOME=/tmp/codex-home \
            -e NPM_CONFIG_CACHE=/tmp/codex-home/npm-cache \
            -e OPENSPEC_VERSION="${OPENSPEC_VERSION}" \
            -e PATH="/tmp/codex-bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin" \
            -v "${PWD}:/workspace" \
            -v "${CODEX_HOME}:/tmp/codex-home" \
            -v "${CODEX_BIN}:/tmp/codex-bin:ro" \
            -v "${RUNNER_TEMP}/codex-logs:/tmp/codex-logs" \
            -w /workspace \
            loads/codex:latest \
            codex exec \
              --cd /workspace \
              --sandbox danger-full-access \
              --ask-for-approval never \
              --output-last-message /tmp/codex-logs/auto-archive.md \
              - <<'PROMPT'
          这是无人值守的 nightly CI 归档任务。请使用仓库内 `.agents/skills/lina-auto-archive/SKILL.md` 的规则执行自动归档：
          1. 只扫描 `openspec/changes/` 根目录下的活跃变更，排除 archive。
          2. 只归档 OpenSpec 状态完成且 `tasks.md` 已全部完成的变更。
          3. 使用 `openspec archive -y`，不要使用 `--no-validate`，不要手动移动目录。
          4. 运行结束后输出中文结果摘要。
          5. 不要修改与 OpenSpec 归档无关的文件；如果无法安全执行，请失败并说明原因。
          PROMPT

      - name: Detect Archive Changes
        id: archive-diff
        if: ${{ steps.detect.outputs.has_candidates == 'true' }}
        run: |
          if git diff --quiet -- openspec; then
            echo "changed=false" >> "${GITHUB_OUTPUT}"
            echo "Auto archive produced no OpenSpec changes."
          else
            echo "changed=true" >> "${GITHUB_OUTPUT}"
            echo "Auto archive produced OpenSpec changes."
          fi

      - name: Run Lina Archive Consolidate
        if: ${{ steps.archive-diff.outputs.changed == 'true' }}
        run: |
          docker run --rm -i \
            --user "$(id -u):$(id -g)" \
            -e CODEX_HOME=/tmp/codex-home \
            -e HOME=/tmp/codex-home \
            -e NPM_CONFIG_CACHE=/tmp/codex-home/npm-cache \
            -e OPENSPEC_VERSION="${OPENSPEC_VERSION}" \
            -e PATH="/tmp/codex-bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin" \
            -v "${PWD}:/workspace" \
            -v "${CODEX_HOME}:/tmp/codex-home" \
            -v "${CODEX_BIN}:/tmp/codex-bin:ro" \
            -v "${RUNNER_TEMP}/codex-logs:/tmp/codex-logs" \
            -w /workspace \
            loads/codex:latest \
            codex exec \
              --cd /workspace \
              --sandbox danger-full-access \
              --ask-for-approval never \
              --output-last-message /tmp/codex-logs/archive-consolidate.md \
              - <<'PROMPT'
          这是无人值守的 nightly CI 归档聚合任务。请使用仓库内 `.agents/skills/lina-archive-consolidate/SKILL.md` 的规则执行归档聚合：
          1. 未指定变更列表时，只处理 `openspec/changes/archive/` 下目录名以 `YYYY-MM-DD-` 开头的原始归档变更。
          2. 不要把既有非日期前缀聚合目录再次作为默认输入。
          3. 生成或更新聚合归档文档时保持变更范围在 `openspec/**` 内。
          4. 不要等待人工交互；如果无法在 CI 中安全完成，请失败并说明原因。
          5. 运行结束后输出中文结果摘要。
          PROMPT

      - name: Validate OpenSpec
        if: ${{ steps.archive-diff.outputs.changed == 'true' }}
        run: |
          npx -y "@fission-ai/openspec@${OPENSPEC_VERSION}" validate --all

      - name: Guard Generated Changes
        if: ${{ steps.detect.outputs.has_candidates == 'true' }}
        run: |
          {
            git diff --name-only
            git ls-files --others --exclude-standard
          } | sort -u > "${RUNNER_TEMP}/changed-files.txt"

          node <<'NODE'
          const fs = require('node:fs');

          const files = fs.readFileSync(`${process.env.RUNNER_TEMP}/changed-files.txt`, 'utf8')
            .split(/\r?\n/)
            .filter(Boolean);
          const allowed = [
            /^openspec\//,
          ];
          const unexpected = files.filter((file) => !allowed.some((pattern) => pattern.test(file)));

          if (unexpected.length > 0) {
            console.error('Unexpected generated file changes:');
            for (const file of unexpected) {
              console.error(`- ${file}`);
            }
            process.exit(1);
          }

          console.log('Generated file changes are within the allowed OpenSpec scope.');
          NODE

      - name: Commit Archive Changes
        if: ${{ steps.archive-diff.outputs.changed == 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add openspec

          if git diff --cached --quiet; then
            echo "No staged archive changes to commit."
            exit 0
          fi

          git commit -m "chore(openspec): archive completed changes"
          git push

      - name: Upload Codex Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-openspec-codex-logs
          path: ${{ runner.temp }}/codex-logs/
          if-no-files-found: ignore
          retention-days: 14
