# LinaPro nightly health test and multi-platform Docker image publishing workflow.
# GitHub cron uses UTC. 16:00 UTC is 00:00 Asia/Shanghai.
name: Nightly Test and Build

on:
  schedule:
    - cron: "0 16 * * *"

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "${{ github.workflow }} @ nightly"
  cancel-in-progress: false

env:
  TZ: "Asia/Shanghai"
  IMAGE_NAME: "linapro"
  PLATFORMS: "linux/amd64,linux/arm64"

jobs:
  windows-command-smoke:
    name: Windows command smoke
    uses: ./.github/workflows/reusable-windows-command-smoke.yml

  backend-unit-tests:
    name: Go unit tests
    uses: ./.github/workflows/reusable-backend-unit-tests.yml

  frontend-unit-tests:
    name: Frontend unit tests
    uses: ./.github/workflows/reusable-frontend-unit-tests.yml

  e2e-tests:
    name: Full E2E tests
    runs-on: ubuntu-latest
    timeout-minutes: 180

    services:
      postgres:
        image: postgres:14-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: linapro
          TZ: Asia/Shanghai
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Setup Timezone
        run: |
          sudo ln -snf /usr/share/zoneinfo/Asia/Shanghai /etc/localtime
          echo Asia/Shanghai | sudo tee /etc/timezone

      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: "10.30.3"
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version-file: "apps/lina-vben/.node-version"
          cache: "pnpm"
          cache-dependency-path: "apps/lina-vben/pnpm-lock.yaml"

      # make dev/stop/status use lsof to detect and clean processes bound to
      # the backend and frontend ports. Keep this explicit because GitHub's
      # ubuntu-latest runner image does not guarantee lsof is preinstalled.
      - name: Install Runtime Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y lsof

      - name: Install Frontend Dependencies
        working-directory: apps/lina-vben
        run: pnpm install --frozen-lockfile

      - name: Install E2E Dependencies
        working-directory: hack/tests
        run: npm ci

      - name: Install Playwright Browsers
        working-directory: hack/tests
        run: npx playwright install --with-deps chromium

      - name: Initialize Database
        run: |
          cp apps/lina-core/manifest/config/config.template.yaml apps/lina-core/manifest/config/config.yaml
          make init confirm=init rebuild=true
          make mock confirm=mock

      - name: Start Services
        run: make dev

      - name: Run Full E2E Suite
        working-directory: hack/tests
        env:
          E2E_BASE_URL: "http://127.0.0.1:5666"
          E2E_API_BASE_URL: "http://127.0.0.1:8080/api/v1/"
          E2E_PUBLIC_BASE_URL: "http://127.0.0.1:8080"
          E2E_PARALLEL_WORKERS: "4"
        run: pnpm test

      - name: Stop Services
        if: always()
        run: make stop

      - name: Upload E2E Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-e2e-report
          path: |
            hack/tests/playwright-report/
            hack/tests/test-results/
            temp/lina-core.log
            temp/lina-vben.log
          if-no-files-found: ignore
          retention-days: 14

  redis-cluster-smoke:
    name: Redis cluster smoke
    runs-on: ubuntu-latest
    timeout-minutes: 45

    # Full E2E keeps the default single-node deployment shape. This narrower
    # smoke starts the backend with cluster.enabled=true so Redis coordination is
    # exercised without making every nightly browser test depend on leader state.
    services:
      # The smoke rebuilds the schema and then starts a real backend process.
      postgres:
        image: postgres:14-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: linapro
          TZ: Asia/Shanghai
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      # The backend refuses to start in cluster mode unless Redis is reachable at
      # startup, so the service health check catches broken Redis containers early.
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Setup Timezone
        run: |
          sudo ln -snf /usr/share/zoneinfo/Asia/Shanghai /etc/localtime
          echo Asia/Shanghai | sudo tee /etc/timezone

      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: false

      - name: Run Redis Cluster Smoke
        env:
          # The smoke script requires an explicit DB link because it runs
          # `make init rebuild=true`; do not let it fall back to a developer DB.
          LINAPRO_REDIS_CLUSTER_SMOKE_DB_LINK: "pgsql:postgres:postgres@tcp(127.0.0.1:5432)/linapro?sslmode=disable"
          LINAPRO_REDIS_CLUSTER_SMOKE_REDIS_ADDR: "127.0.0.1:6379"
        run: |
          ./hack/tests/scripts/run-redis-cluster-smoke.sh

      - name: Upload Redis Cluster Smoke Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-redis-cluster-smoke-log
          path: |
            temp/redis-cluster-smoke/lina-core.log
          if-no-files-found: ignore
          retention-days: 14

  nightly-image:
    name: Build and publish nightly image
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
      packages: write
    needs:
      - windows-command-smoke
      - backend-unit-tests
      - frontend-unit-tests
      - e2e-tests
      - redis-cluster-smoke

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: "10.30.3"
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version-file: "apps/lina-vben/.node-version"
          cache: "pnpm"
          cache-dependency-path: "apps/lina-vben/pnpm-lock.yaml"

      - name: Install Frontend Dependencies
        working-directory: apps/lina-vben
        run: pnpm install --frozen-lockfile

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare Image Metadata
        id: image
        run: |
          owner="$(printf '%s' "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          image_name="$(printf '%s' "${IMAGE_NAME}" | tr '[:upper:]' '[:lower:]')"
          registry="ghcr.io/${owner}"
          date_tag="nightly-$(date +'%Y%m%d')"
          image_ref="${registry}/${image_name}"

          {
            echo "registry=${registry}"
            echo "image_name=${image_name}"
            echo "date_tag=${date_tag}"
            echo "image_ref=${image_ref}"
          } >> "${GITHUB_OUTPUT}"

          echo "Publishing ${image_ref}:${date_tag} for ${PLATFORMS}"

      - name: Build and Push Multi-Platform Image
        run: |
          make image \
            config=".github/image/config.yaml" \
            platforms="${PLATFORMS}" \
            registry="${{ steps.image.outputs.registry }}" \
            image="${{ steps.image.outputs.image_name }}" \
            tag="${{ steps.image.outputs.date_tag }}" \
            push=1

      - name: Publish Floating Nightly Tag
        run: |
          docker buildx imagetools create \
            --tag "${{ steps.image.outputs.image_ref }}:nightly" \
            "${{ steps.image.outputs.image_ref }}:${{ steps.image.outputs.date_tag }}"

      - name: Inspect Published Manifest
        run: |
          docker buildx imagetools inspect "${{ steps.image.outputs.image_ref }}:${{ steps.image.outputs.date_tag }}"
