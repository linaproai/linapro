# LinaPro backend main CI workflow.
# Runs on every push and pull request to main.
name: Main CI

on:
  push:
    branches:
    - main
    - develop
    - feat/**
    - fix/**

  pull_request:
    branches:
    - main
    - develop
    - feat/**
    - fix/**

  workflow_dispatch:
    inputs:
      debug:
        type: boolean
        description: 'Enable tmate Debug'
        required: false
        default: false

# Cancel in-progress runs for the same branch/PR to save CI minutes.
concurrency:
  group: '${{ github.workflow }} @ ${{ github.event.pull_request.head.label || github.head_ref || github.ref }}'
  cancel-in-progress: true

env:
  TZ: "Asia/Shanghai"

jobs:
  backend-unit-tests:
    name: Go unit tests
    uses: ./.github/workflows/reusable-backend-unit-tests.yml

  frontend-unit-tests:
    name: Frontend unit tests
    uses: ./.github/workflows/reusable-frontend-unit-tests.yml

  # SQLite Backend Smoke Tests
  sqlite-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Setup Timezone
        uses: szenius/set-timezone@v2.0
        with:
          timezoneLinux: "Asia/Shanghai"

      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: '**/go.sum'

      - name: Run SQLite Backend Smoke
        run: |
          ./hack/tests/scripts/run-sqlite-smoke.sh
