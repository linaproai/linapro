# LinaPro reusable OpenSpec archive workflow for Claude Code.
name: Nightly OpenSpec Archive Claude Code

on:
  workflow_call:
    inputs:
      openspec_version:
        description: OpenSpec CLI version to run.
        required: false
        type: string
        default: "1.3.1"
      anthropic_custom_model:
        description: Claude Code model name from GitHub Variables.
        required: false
        type: string
        default: ""
    secrets:
      ANTHROPIC_AUTH_TOKEN:
        required: true
      ANTHROPIC_BASE_URL:
        required: true
      ANTHROPIC_CUSTOM_MODEL:
        required: false

permissions:
  contents: write

env:
  TZ: "Asia/Shanghai"
  OPENSPEC_VERSION: ${{ inputs.openspec_version }}
  ANTHROPIC_CUSTOM_MODEL_INPUT: ${{ inputs.anthropic_custom_model }}

jobs:
  archive:
    name: Archive and consolidate with Claude Code
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Setup Timezone
        run: |
          sudo ln -snf /usr/share/zoneinfo/Asia/Shanghai /etc/localtime
          echo Asia/Shanghai | sudo tee /etc/timezone

      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "23"

      - name: Prepare Claude Code Runtime
        env:
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          ANTHROPIC_CUSTOM_MODEL_SECRET: ${{ secrets.ANTHROPIC_CUSTOM_MODEL }}
        run: |
          set -euo pipefail

          if [ -z "${ANTHROPIC_AUTH_TOKEN}" ]; then
            echo "ANTHROPIC_AUTH_TOKEN secret is not configured." >&2
            exit 1
          fi
          if [ -z "${ANTHROPIC_BASE_URL}" ]; then
            echo "ANTHROPIC_BASE_URL secret is not configured." >&2
            exit 1
          fi

          anthropic_custom_model="${ANTHROPIC_CUSTOM_MODEL_INPUT:-${ANTHROPIC_CUSTOM_MODEL_SECRET:-}}"
          if [ -z "${anthropic_custom_model}" ]; then
            echo "ANTHROPIC_CUSTOM_MODEL variable or secret is not configured." >&2
            exit 1
          fi

          cc_home="${RUNNER_TEMP}/cc-home"
          cc_bin="${RUNNER_TEMP}/cc-bin"
          cc_logs="${RUNNER_TEMP}/cc-logs"
          mkdir -p "${cc_home}" "${cc_bin}" "${cc_logs}"

          CC_HOME="${cc_home}" \
          ANTHROPIC_CUSTOM_MODEL_EFFECTIVE="${anthropic_custom_model}" \
          python3 <<'PY'
          import json
          import os
          from pathlib import Path

          cc_home = Path(os.environ["CC_HOME"])
          template_path = Path(".github/cc/settings.template.json")
          replacements = {
              "${ANTHROPIC_AUTH_TOKEN}": os.environ["ANTHROPIC_AUTH_TOKEN"],
              "${ANTHROPIC_BASE_URL}": os.environ["ANTHROPIC_BASE_URL"],
              "${ANTHROPIC_CUSTOM_MODEL}": os.environ["ANTHROPIC_CUSTOM_MODEL_EFFECTIVE"],
          }

          def replace_placeholders(value):
              if isinstance(value, dict):
                  return {key: replace_placeholders(item) for key, item in value.items()}
              if isinstance(value, list):
                  return [replace_placeholders(item) for item in value]
              if isinstance(value, str):
                  return replacements.get(value, value)
              return value

          settings = replace_placeholders(json.loads(template_path.read_text(encoding="utf-8")))
          (cc_home / "settings.json").write_text(
              json.dumps(settings, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )
          PY

          chmod 600 "${cc_home}/settings.json"

          cat > "${cc_bin}/openspec" <<'SH'
          #!/usr/bin/env sh
          exec npx -y "@fission-ai/openspec@${OPENSPEC_VERSION:-1.3.1}" "$@"
          SH
          chmod +x "${cc_bin}/openspec"

          cat > "${cc_bin}/run-cc-task" <<'SH'
          #!/usr/bin/env bash
          set -euo pipefail

          task_name="${1:?missing Claude Code task name}"
          case "${task_name}" in
            auto-archive|archive-consolidate)
              ;;
            *)
              echo "Unsupported Claude Code task: ${task_name}" >&2
              exit 1
              ;;
          esac

          prompt_file="$(mktemp "${RUNNER_TEMP:-/tmp}/cc-prompt.XXXXXX")"
          trap 'rm -f "${prompt_file}"' EXIT
          cat > "${prompt_file}"

          mkdir -p "${CC_HOME}/npm-cache" "${CC_LOGS}"

          docker run --rm -i \
            --user "$(id -u):$(id -g)" \
            -e HOME=/tmp/cc-home \
            -e NPM_CONFIG_CACHE=/tmp/cc-home/npm-cache \
            -e OPENSPEC_VERSION="${OPENSPEC_VERSION}" \
            -e PATH="/tmp/cc-bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin" \
            -v "${PWD}:/workspace" \
            -v "${CC_HOME}:/tmp/cc-home" \
            -v "${CC_BIN}:/tmp/cc-bin:ro" \
            -v "${CC_LOGS}:/tmp/cc-logs" \
            -w /workspace \
            loads/cc:latest \
            sh -lc 'claude -p --settings /tmp/cc-home/settings.json --permission-mode bypassPermissions --dangerously-skip-permissions --output-format text > "$1"' \
            sh "/tmp/cc-logs/${task_name}.md" < "${prompt_file}"
          SH
          chmod +x "${cc_bin}/run-cc-task"

          {
            echo "CC_HOME=${cc_home}"
            echo "CC_BIN=${cc_bin}"
            echo "CC_LOGS=${cc_logs}"
          } >> "${GITHUB_ENV}"

      - name: Run Lina Auto Archive
        run: |
          "${CC_BIN}/run-cc-task" auto-archive < .github/prompts/nightly-openspec-auto-archive.zh-CN.md

      - name: Detect Archive Changes
        id: archive-diff
        run: |
          if git diff --quiet -- openspec; then
            echo "changed=false" >> "${GITHUB_OUTPUT}"
            echo "Auto archive produced no OpenSpec changes."
          else
            echo "changed=true" >> "${GITHUB_OUTPUT}"
            echo "Auto archive produced OpenSpec changes."
          fi

      - name: Run Lina Archive Consolidate
        if: ${{ steps.archive-diff.outputs.changed == 'true' }}
        run: |
          "${CC_BIN}/run-cc-task" archive-consolidate < .github/prompts/nightly-openspec-archive-consolidate.zh-CN.md

      - name: Validate OpenSpec
        if: ${{ steps.archive-diff.outputs.changed == 'true' }}
        run: |
          npx -y "@fission-ai/openspec@${OPENSPEC_VERSION}" validate --all

      - name: Guard Generated Changes
        run: |
          {
            git diff --name-only
            git ls-files --others --exclude-standard
          } | sort -u > "${RUNNER_TEMP}/changed-files.txt"

          node <<'NODE'
          const fs = require('node:fs');

          const files = fs.readFileSync(`${process.env.RUNNER_TEMP}/changed-files.txt`, 'utf8')
            .split(/\r?\n/)
            .filter(Boolean);
          const allowed = [
            /^openspec\//,
          ];
          const unexpected = files.filter((file) => !allowed.some((pattern) => pattern.test(file)));

          if (unexpected.length > 0) {
            console.error('Unexpected generated file changes:');
            for (const file of unexpected) {
              console.error(`- ${file}`);
            }
            process.exit(1);
          }

          console.log('Generated file changes are within the allowed OpenSpec scope.');
          NODE

      - name: Commit Archive Changes
        if: ${{ steps.archive-diff.outputs.changed == 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add openspec

          if git diff --cached --quiet; then
            echo "No staged archive changes to commit."
            exit 0
          fi

          git commit -m "chore(openspec): archive completed changes"
          git push

      - name: Upload Claude Code Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-openspec-cc-logs
          path: ${{ runner.temp }}/cc-logs/
          if-no-files-found: ignore
          retention-days: 14
