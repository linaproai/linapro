# Development-only configuration used by local build/codegen tools and the
# repository-root framework upgrade tool. Runtime binaries must not read this file.

# Shared local database connection reused by development-only tools.
shared:
  localDatabaseLink: &localDatabaseLink "mysql:root:12345678@tcp(127.0.0.1:3306)/lina?charset=utf8mb4&parseTime=true&loc=Local"

# Database config consumed by development-only SQL bootstrap/upgrade flows.
database:
  default:
    link: *localDatabaseLink
    debug: true

# Source-upgrade metadata consumed by `hack/tools/upgrade-source`.
frameworkUpgrade:
  version: "v0.1.0"
  repositoryUrl: "https://github.com/linaproai/linapro"

# CLI tool, only in development environment.
# https://goframe.org/docs/cli
gfcli:
  gen:
    dao:
      - link: *localDatabaseLink
        tables: "sys_*"
        descriptionTag: true
        noModelComment: true
