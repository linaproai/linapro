# 系统信息页组件元数据配置
# `version` 为 `auto` 时会在运行时自动填充实际版本

# 后端组件元数据
backend:
  - name: "GoFrame"
    version: "auto"
    url: "https://goframe.org"
    description: "Go语言应用开发框架"
  - name: "MySQL"
    version: "auto"
    url: "https://www.mysql.com"
    description: "关系型数据库"
  - name: "JWT"
    version: "v5.3.1"
    url: "https://jwt.io"
    description: "身份认证"
  - name: "Excelize"
    version: "v2.10.1"
    url: "https://github.com/qax-os/excelize"
    description: "Excel文件处理库"

# 前端组件元数据
frontend:
  - name: "Vue"
    version: "3.x"
    url: "https://vuejs.org"
    description: "渐进式JavaScript框架"
  - name: "Vben 5"
    version: "5.x"
    url: "https://www.vben.pro"
    description: "默认管理工作台前端框架"
  - name: "Ant Design Vue"
    version: "4.x"
    url: "https://antdv.com"
    description: "UI组件库"
  - name: "TypeScript"
    version: "5.x"
    url: "https://www.typescriptlang.org"
    description: "类型安全的JavaScript"
  - name: "Vite"
    version: "6.x"
    url: "https://vite.dev"
    description: "前端构建工具"
  - name: "Pinia"
    version: "3.x"
    url: "https://pinia.vuejs.org"
    description: "状态管理"
  - name: "TailwindCSS"
    version: "4.x"
    url: "https://tailwindcss.com"
    description: "原子化CSS框架"
