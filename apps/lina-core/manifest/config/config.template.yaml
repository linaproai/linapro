# HTTP 服务配置
# https://goframe.org/docs/web/server-config-file-template
server:
  # 服务监听地址
  address: ":8080"
  # 是否在启动时输出路由表
  dumpRouterMap: false
  # LinaPro 对 GoFrame server 组件的扩展配置
  extensions:
    # 宿主自建 OpenAPI JSON 文档访问路径
    apiDocPath: "/api.json"

# 日志配置
# https://goframe.org/docs/core/glog-config
logger:
  # 日志文件目录；为空时仅输出到终端
  path: ""
  # 业务日志与 HTTP Server 日志共享的文件名模式
  file: "{Y-m-d}.log"
  # 日志级别
  level: "all"
  # 是否输出到标准输出
  stdout: true
  # LinaPro 对 GoFrame logger 组件的扩展配置
  extensions:
    # 是否开启 GoFrame 官方 JSON 结构化日志 Handler
    structured: false
    # 是否在日志中输出 TraceID；默认 false，仅显式开启时输出
    traceIDEnabled: false

# 数据库配置
# https://goframe.org/docs/core/gdb-config-file
database:
  default:
    # 默认数据库连接串
    link: "mysql:root:12345678@tcp(127.0.0.1:3306)/lina?charset=utf8mb4&parseTime=true&loc=Local&multiStatements=true"
    # 是否开启 SQL 调试日志
    debug: true

# JWT 配置
jwt:
  # JWT 签名密钥
  secret: "lina-jwt-secret-key-change-in-production"
  # Token 有效期（duration 字符串）
  expire: 24h

# 在线会话配置
session:
  # 会话无活动超时时间（duration 字符串）
  timeout: 24h
  # 会话清理任务执行间隔（duration 字符串）
  cleanupInterval: 5m

# 服务监控配置
monitor:
  # 服务指标采集间隔（duration 字符串）
  interval: 30s

# 集群部署配置
cluster:
  # 是否开启集群多节点模式；默认 false 表示单节点模式
  enabled: false
  election:
    # 选举锁租约时长
    lease: 30s
    # 租约续约间隔，建议为租约时长的三分之一
    renewInterval: 10s

# 上传配置
upload:
  # 上传文件保存目录
  path: "temp/upload"
  # 单个上传文件大小上限（MB）
  maxSize: 16

# 插件配置
plugin:
  # 动态插件相关配置
  dynamic:
    # 动态插件构建产物存储目录
    storagePath: "temp/output"
