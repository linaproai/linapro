# HTTP 服务配置
# https://goframe.org/docs/web/server-config-file-template
server:
  # 服务监听地址
  address: ":8080"
  # OpenAPI JSON 文档访问路径
  openapiPath: "/api.json"
  # Swagger UI 访问路径
  swaggerPath: "/swagger"
  # 是否在启动时输出路由表
  dumpRouterMap: false

# 日志配置
# https://goframe.org/docs/core/glog-config
logger:
  # 日志级别
  level: "all"
  # 是否输出到标准输出
  stdout: true

# 数据库配置
# https://goframe.org/docs/core/gdb-config-file
database:
  default:
    # 默认数据库连接串
    link: "mysql:root:12345678@tcp(127.0.0.1:3306)/lina?charset=utf8mb4&parseTime=true&loc=Local&multiStatements=true"
    # 是否开启 SQL 调试日志
    debug: true

# JWT 配置
jwt:
  # JWT 签名密钥
  secret: "lina-jwt-secret-key-change-in-production"
  # Token 有效期（duration 字符串）
  expire: 24h

# 在线会话配置
session:
  # 会话无活动超时时间（duration 字符串）
  timeout: 24h
  # 会话清理任务执行间隔（duration 字符串）
  cleanupInterval: 5m

# 服务监控配置
monitor:
  # 服务指标采集间隔（duration 字符串）
  interval: 30s

# 集群部署配置
cluster:
  # 是否开启集群多节点模式；默认 false 表示单节点模式
  enabled: false
  election:
    # 选举锁租约时长
    lease: 30s
    # 租约续约间隔，建议为租约时长的三分之一
    renewInterval: 10s

# 上传配置
upload:
  # 上传文件保存目录
  path: "temp/upload"
  # 单个上传文件大小上限（MB）
  maxSize: 10

# 插件配置
plugin:
  # 动态插件相关配置
  dynamic:
    # 动态插件构建产物存储目录
    storagePath: "temp/output"

# OpenAPI 文档配置
openapi:
  # 文档标题
  title: "Lina Framework API"
  # 文档说明
  description: "Lina 核心宿主服务接口文档，覆盖通用模块能力、系统治理能力与默认管理工作台适配接口。"
  # 文档版本
  version: "v0.5.0"
  # 后端服务访问地址
  serverUrl: "http://localhost:8080"
  # 服务地址说明
  serverDescription: "CoreHostEndpoint"

# 数据库初始化配置
# 执行 `make init` 时会按 ASCII 顺序扫描并执行 `sqlDir` 下的所有 SQL 文件
init:
  # SQL 文件目录
  sqlDir: "manifest/sql"
