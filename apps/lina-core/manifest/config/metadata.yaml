# 接口文档与版本信息页元数据配置
# `version` 为 `auto` 时会在运行时自动填充实际版本

# 框架元数据
framework:
  # 框架名称
  name: "LinaPro"
  # 框架版本
  version: "v0.1.0"
  # 框架介绍
  description: "AI驱动的全栈开发框架，提供通用核心宿主服务、默认管理工作台、插件扩展能力与 AI 协作研发工作流。"
  # 项目官网
  homepage: "https://linapro.ai"
  # 仓库地址
  repositoryUrl: "https://github.com/gqcn/linapro"
  # 开源协议
  license: "Apache 2.0"

# OpenAPI 文档元数据
openapi:
  # 文档标题
  title: "LinaPro Framework API"
  # 文档说明
  description: "LinaPro 核心宿主服务接口文档，覆盖通用模块能力、系统治理能力与默认管理工作台适配接口。"
  # 文档版本
  version: "v0.5.0"
  # 后端服务访问地址
  serverUrl: "http://localhost:8080"
  # 服务地址说明
  serverDescription: "CoreHostEndpoint"

# 后端组件元数据
backend:
  - name: "GoFrame"
    version: "auto"
    url: "https://goframe.org"
    description: "Go语言开发框架"
  - name: "MySQL"
    version: "auto"
    url: "https://www.mysql.com"
    description: "关系型数据库"
  - name: "JWT"
    version: "v5.3.1"
    url: "https://jwt.io"
    description: "身份认证"
  - name: "Excelize"
    version: "v2.10.1"
    url: "https://github.com/qax-os/excelize"
    description: "Excel文件处理库"

# 前端组件元数据
frontend:
  - name: "Vue"
    version: "3.x"
    url: "https://vuejs.org"
    description: "渐进式JavaScript框架"
  - name: "Vben 5"
    version: "5.x"
    url: "https://www.vben.pro"
    description: "默认管理工作台前端框架"
  - name: "Ant Design Vue"
    version: "4.x"
    url: "https://antdv.com"
    description: "UI组件库"
  - name: "TypeScript"
    version: "5.x"
    url: "https://www.typescriptlang.org"
    description: "类型安全的JavaScript"
  - name: "Vite"
    version: "6.x"
    url: "https://vite.dev"
    description: "前端构建工具"
  - name: "Pinia"
    version: "3.x"
    url: "https://pinia.vuejs.org"
    description: "状态管理"
  - name: "TailwindCSS"
    version: "4.x"
    url: "https://tailwindcss.com"
    description: "原子化CSS框架"
