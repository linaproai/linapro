# 插件唯一标识。
# 必填。
# 需要在宿主仓库范围内唯一，并使用 `kebab-case` 命名风格。
id: plugin-demo-dynamic

# 插件显示名称。
# 必填。
name: 动态插件示例

# 插件语义化版本号。
# 必填。
# 需要使用 `semver` 格式，示例统一使用带 `v` 前缀的写法。
version: v0.1.0

# 插件一级类型。
# 动态插件固定为 `dynamic`。
type: dynamic

# 插件说明。
description: 提供独立的 dynamic wasm 插件样例，演示左侧菜单内嵌页面与独立静态页面跳转

# 插件作者或归属团队。
# 可选。
author: lina-team

# 插件主页或文档地址。
# 可选。
homepage: https://example.com/lina/plugins/plugin-demo-dynamic

# 插件许可证标识。
# 可选。
license: Apache-2.0

# 插件宿主服务声明。
# 结构化声明当前插件申请调用的宿主 service 与 method。
# 宿主内部会根据 `methods` 自动推导粗粒度 capability 分类，
# 作者侧不再需要重复维护单独的顶层 `capabilities` 列表。
# 每个 service 块的常用字段说明：
# - `service`：宿主服务名，例如 `runtime`、`storage`、`network`、`data`
# - `methods`：当前服务申请的具体方法集合
# - `resources`：该服务的资源治理边界；不同服务的资源结构不同
hostServices:
  # runtime 服务不依赖额外资源对象，只声明所需 methods。
  - service: runtime
    methods:
      # 写入宿主结构化日志。
      - log.write
      # 读取插件隔离状态。
      - state.get
      # 写入插件隔离状态。
      - state.set
      # 删除插件隔离状态。
      - state.delete
      # 读取宿主当前时间。
      - info.now
      # 生成宿主侧 UUID。
      - info.uuid
      # 读取当前宿主节点标识。
      - info.node
  # storage 服务通过 `resources.paths` 声明申请的逻辑路径或路径前缀。
  - service: storage
    methods:
      - put
      - get
      - delete
      - list
      - stat
    resources:
      paths:
        # 申请在 `host-call-demo/` 前缀下读写样例对象，最终是否放行由宿主确认。
        - host-call-demo/
  # network 服务通过 `resources[].url` 声明申请访问的 URL 或 URL pattern。
  - service: network
    methods:
      - request
    resources:
      # 当前样例只申请访问 `https://example.com`，最终授权由宿主确认。
      - url: https://example.com
  # data 服务通过 `resources.tables` 声明申请访问的数据表名单。
  - service: data
    methods:
      # 分页查询多条记录。
      - list
      # 按主键读取单条记录。
      - get
      # 新增记录。
      - create
      # 更新记录。
      - update
      # 删除记录。
      - delete
      # 执行单表结构化事务。
      - transaction
    resources:
      tables:
        # 当前样例申请访问 `sys_plugin_node_state` 表，最终是否授权由宿主确认。
        - sys_plugin_node_state

# 插件菜单元数据。
# 宿主会在动态插件安装时按这些声明写入 `sys_menu`，卸载时再按同一份声明删除菜单与角色关联。
# 每个菜单对象支持的常用字段说明：
# - `key`：必填，菜单唯一键；必须使用 `plugin:<plugin-id>:<menu-key>` 前缀格式。
# - `parent_key`：可选，父级菜单 key；常用于把按钮或子菜单挂到当前插件目录下。
# - `name`：必填，菜单/按钮显示名称。
# - `path`：可选，路由路径或托管静态资源路径；动态插件静态页通常写 `/plugin-assets/<plugin-id>/<version>/...`。
# - `component`：可选，宿主路由组件；宿主内嵌挂载通常使用 `system/plugin/dynamic-page`。
# - `perms`：可选，权限标识；宿主会将其并入角色菜单/按钮权限治理。
# - `icon`：可选，Iconify 图标名称。
# - `type`：可选，菜单类型；`D=目录`、`M=菜单`、`B=按钮`。
# - `sort`：可选，排序值；越小越靠前。
# - `visible/status/is_frame/is_cache`：可选，均使用 `0/1` 语义，与宿主菜单字段保持一致。
# - `query` / `query_param`：可选，附加路由参数；推荐优先使用结构化的 `query`。
# - `remark`：可选，写入宿主菜单备注，便于宿主治理。
menus:
  # 该示例声明一个宿主内嵌菜单，实际页面资源来自动态插件托管的 `mount.js`。
  - key: plugin:plugin-demo-dynamic:main-entry
    # 左侧菜单显示名称。
    name: 动态插件示例
    # 指向动态插件静态资源托管地址；版本号通常与当前插件版本保持一致。
    path: /plugin-assets/plugin-demo-dynamic/v0.1.0/mount.js
    # 宿主用于挂载动态插件页面的统一壳组件。
    component: system/plugin/dynamic-page
    # 当前菜单对应的查看权限标识。
    perms: plugin-demo-dynamic:view
    # 菜单图标，使用 Iconify 命名格式。
    icon: ant-design:deployment-unit-outlined
    # `M` 表示普通菜单页面。
    type: M
    # 排到较靠前位置，便于在示例环境中快速看到。
    sort: -1
    # 宿主额外路由参数；这里指定 `embedded-mount`，表示按宿主内嵌模式挂载插件入口。
    query:
      pluginAccessMode: embedded-mount
    # 宿主菜单表中的备注说明。
    remark: plugin-demo-dynamic embedded mount menu entry
