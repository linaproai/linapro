<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>API Documentation</title>
  <link rel="stylesheet" href="./styles.min.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; background-color: #fff; }

    .api-docs-loading {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff;
      color: #111827;
      transition: opacity 0.2s ease, visibility 0.2s ease;
    }
    .api-docs-loading-panel {
      display: flex;
      max-width: min(360px, calc(100vw - 48px));
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 12px 32px rgba(15, 23, 42, 0.10);
    }
    .api-docs-loading-spinner {
      width: 20px;
      height: 20px;
      flex: 0 0 auto;
      border: 2px solid #d1d5db;
      border-top-color: #2563eb;
      border-radius: 50%;
      animation: api-docs-loading-spin 0.8s linear infinite;
    }
    .api-docs-loading-copy {
      min-width: 0;
      line-height: 1.4;
    }
    .api-docs-loading-title {
      display: block;
      font-size: 14px;
      font-weight: 600;
    }
    .api-docs-loading-note {
      display: block;
      margin-top: 2px;
      color: #6b7280;
      font-size: 12px;
    }
    body.api-docs-ready .api-docs-loading {
      opacity: 0;
      pointer-events: none;
      visibility: hidden;
    }
    body.api-docs-error .api-docs-loading-spinner {
      border-color: #fecaca;
      border-top-color: #dc2626;
      animation: none;
    }
    @keyframes api-docs-loading-spin {
      to { transform: rotate(360deg); }
    }

    /* 减少侧边栏顶部空白：隐藏标题容器并去除多余间距 */
    .sl-overflow-y-auto.sl-flex-col.sl-sticky {
      padding-top: 0 !important;
    }
    /* FB-30: 隐藏侧边栏顶部的 API 文档标题容器（如 "LinaPro Framework API"） */
    .sl-overflow-y-auto.sl-flex-col.sl-sticky > div.sl-flex.sl-items-center.sl-mb-5 {
      display: none !important;
    }
    /* 去除 Overview 上方的额外间距 */
    .sl-overflow-y-auto.sl-flex-col.sl-sticky .sl-my-3 {
      margin-top: 20px !important;
    }

    /* 减少右侧接口详情顶部间距 */
    .sl-py-16 {
      padding-top: 20px !important;
    }

    /* FB-21: 只有模块名称（sl-pl-4）粗体，接口名称（sl-pl-8）不粗体 */
    .sl-flex.sl-items-center.sl-h-md.sl-pl-4 > .sl-flex-1.sl-truncate,
    .sl-flex.sl-items-center.sl-h-md.sl-pl-4 > .sl-flex-1.sl-items-center.sl-truncate {
      font-weight: 700 !important;
    }
    .sl-flex.sl-items-center.sl-h-md.sl-pl-8 > .sl-flex-1.sl-truncate,
    .sl-flex.sl-items-center.sl-h-md.sl-pl-8 > .sl-flex-1.sl-items-center.sl-truncate {
      font-weight: 400 !important;
    }

    /* FB-22: 隐藏 "powered by Stoplight" */
    a.sl-flex.sl-items-center.sl-px-4.sl-py-3.sl-border-t {
      display: none !important;
    }

    /* FB-23: 接口地址背景块宽度与板块一致，GET 左侧、路径右侧 */
    div[title].sl-inline-flex.sl-font-mono.sl-bg-canvas-50.sl-rounded-lg {
      display: flex !important;
      width: 100% !important;
      justify-content: space-between !important;
    }

    /* FB-24: SCHEMAS 折叠区域样式 */
    .schemas-section-header {
      cursor: pointer;
      user-select: none;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .schemas-section-header::before {
      content: '';
      display: inline-block;
      width: 0;
      height: 0;
      border-style: solid;
      border-width: 5px 0 5px 6px;
      border-color: transparent transparent transparent currentColor;
      transition: transform 0.2s;
    }
    .schemas-section-header.expanded::before {
      transform: rotate(90deg);
    }
    .schemas-section-collapsed {
      display: none !important;
    }
  </style>
</head>
<body>
  <div id="api-docs-loading" class="api-docs-loading" role="status" aria-live="polite" aria-atomic="true">
    <div class="api-docs-loading-panel">
      <span class="api-docs-loading-spinner" aria-hidden="true"></span>
      <span class="api-docs-loading-copy">
        <span id="api-docs-loading-title" class="api-docs-loading-title">接口文档加载中</span>
        <span id="api-docs-loading-note" class="api-docs-loading-note">正在准备接口索引和调试面板</span>
      </span>
    </div>
  </div>
  <script>
    var apiDocsLoadingTimer = null;
    var apiDocsMessages = {
      'zh-CN': {
        loadingTitle: '接口文档加载中',
        loadingNote: '正在准备接口索引和调试面板',
        slowTitle: '接口内容较多，仍在加载中',
        slowNote: '请稍候，文档解析完成后会自动显示',
        errorTitle: '接口文档加载失败',
        errorNote: '请刷新页面或稍后重试'
      },
      'en-US': {
        loadingTitle: 'Loading API documentation',
        loadingNote: 'Preparing the endpoint index and try-it panel',
        slowTitle: 'Large API document is still loading',
        slowNote: 'The page will appear automatically after parsing finishes',
        errorTitle: 'API documentation failed to load',
        errorNote: 'Refresh the page or try again later'
      }
    };

    function resolveApiDocsMessages(lang) {
      return String(lang || '').toLowerCase().indexOf('zh') === 0
        ? apiDocsMessages['zh-CN']
        : apiDocsMessages['en-US'];
    }

    function updateApiDocsLoadingText(state, lang) {
      var title = document.getElementById('api-docs-loading-title');
      var note = document.getElementById('api-docs-loading-note');
      if (!title || !note) return;

      var messages = resolveApiDocsMessages(lang || document.documentElement.getAttribute('lang'));
      if (state === 'slow') {
        title.textContent = messages.slowTitle;
        note.textContent = messages.slowNote;
      } else if (state === 'error') {
        title.textContent = messages.errorTitle;
        note.textContent = messages.errorNote;
      } else {
        title.textContent = messages.loadingTitle;
        note.textContent = messages.loadingNote;
      }
    }

    function markApiDocsReady() {
      if (document.body.classList.contains('api-docs-ready')) return;
      if (apiDocsLoadingTimer) {
        window.clearTimeout(apiDocsLoadingTimer);
        apiDocsLoadingTimer = null;
      }
      document.body.classList.add('api-docs-ready');
      document.body.classList.remove('api-docs-error');
    }

    function markApiDocsError() {
      if (document.body.classList.contains('api-docs-ready')) return;
      if (apiDocsLoadingTimer) {
        window.clearTimeout(apiDocsLoadingTimer);
        apiDocsLoadingTimer = null;
      }
      document.body.classList.add('api-docs-error');
      updateApiDocsLoadingText('error');
    }

    function isApiDocsRendered() {
      var sidebar = document.querySelector('.sl-overflow-y-auto.sl-flex-col.sl-sticky');
      return !!(sidebar && sidebar.querySelector('.sl-uppercase'));
    }

    function updateApiDocsReadyState() {
      if (isApiDocsRendered()) {
        markApiDocsReady();
      }
    }

    // FB-32: Read JWT token from URL parameter and pre-fill Stoplight Try It auth
    (function() {
      var params = new URLSearchParams(window.location.search);
      var token = params.get('token');
      var lang = params.get('lang') || 'zh-CN';
      var apiParams = new URLSearchParams();
      apiParams.set('lang', lang);
      document.documentElement.setAttribute('lang', lang);
      updateApiDocsLoadingText('loading', lang);
      apiDocsLoadingTimer = window.setTimeout(function() {
        if (!document.body.classList.contains('api-docs-ready')) {
          updateApiDocsLoadingText('slow', lang);
        }
      }, 15000);
      window.addEventListener('error', function(event) {
        var target = event.target || event.srcElement;
        if (target && target.tagName === 'SCRIPT') {
          markApiDocsError();
        }
      }, true);
      if (token) {
        localStorage.setItem('TryIt_securitySchemeValues', JSON.stringify({
          BearerAuth: token
        }));
      }
      var apiDescriptionUrl = window.location.origin + '/api.json?' + apiParams.toString();
      var apiElement = document.createElement('elements-api');
      apiElement.setAttribute('apiDescriptionUrl', apiDescriptionUrl);
      apiElement.setAttribute('router', 'memory');
      apiElement.setAttribute('layout', 'sidebar');
      apiElement.setAttribute('tryItCredentialsPolicy', 'same-origin');
      apiElement.setAttribute('hideInternal', 'true');
      apiElement.apiDescriptionUrl = apiDescriptionUrl;
      apiElement.router = 'memory';
      apiElement.layout = 'sidebar';
      apiElement.tryItCredentialsPolicy = 'same-origin';
      apiElement.hideInternal = true;
      document.body.appendChild(apiElement);
    })();
  </script>
  <script src="./web-components.min.js"></script>
  <script>
    // FB-24: 将 SCHEMAS 区域做成可折叠（默认折叠）
    function setupSchemasCollapse() {
      var sidebar = document.querySelector('.sl-overflow-y-auto.sl-flex-col.sl-sticky');
      if (!sidebar) return;

      // 找到 Schemas 标题
      var headings = sidebar.querySelectorAll('.sl-uppercase.sl-font-bold');
      var schemasHeading = null;
      headings.forEach(function(h) {
        if (h.textContent.trim() === 'Schemas') schemasHeading = h;
      });
      if (!schemasHeading || schemasHeading.classList.contains('schemas-section-header')) return;

      schemasHeading.classList.add('schemas-section-header');

      // 收集 Schemas 标题之后的所有 schema 项
      var schemaItems = [];
      var sibling = schemasHeading.nextElementSibling;
      while (sibling) {
        if (sibling.classList.contains('sl-uppercase') && sibling.classList.contains('sl-font-bold')) break;
        schemaItems.push(sibling);
        sibling = sibling.nextElementSibling;
      }

      // 默认折叠
      schemaItems.forEach(function(item) {
        item.classList.add('schemas-section-collapsed');
      });

      // 点击切换
      schemasHeading.addEventListener('click', function() {
        var expanded = schemasHeading.classList.toggle('expanded');
        schemaItems.forEach(function(item) {
          if (expanded) {
            item.classList.remove('schemas-section-collapsed');
          } else {
            item.classList.add('schemas-section-collapsed');
          }
        });
      });
    }

    // 等待 Stoplight Elements 渲染完成后执行
    var observer = new MutationObserver(function() {
      var sidebar = document.querySelector('.sl-overflow-y-auto.sl-flex-col.sl-sticky');
      if (sidebar && sidebar.querySelector('.sl-uppercase')) {
        markApiDocsReady();
        setupSchemasCollapse();
      }
    });
    observer.observe(document.body, { childList: true, subtree: true });
    window.addEventListener('load', function() {
      window.setTimeout(updateApiDocsReadyState, 0);
    });
  </script>
</body>
</html>
