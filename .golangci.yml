version: "2"
run:
  concurrency: 4
  modules-download-mode: readonly
  issues-exit-code: 2
  tests: false
  allow-parallel-runners: true
  allow-serial-runners: true

linters:
  default: none
  enable:
    - errcheck
    - errchkjson
    - goconst
    - gocritic
    - govet
    - misspell
    - nolintlint
    - revive
    - staticcheck
    - usestdlibvars
    - whitespace
  settings:
    goconst:
      min-len: 4
      min-occurrences: 30
      match-constant: false
      numbers: true
      min: 5
      max: 20
      ignore-calls: false
    gocritic:
      disabled-checks:
        - appendAssign
        - assignOp
        - elseif
        - ifElseChain
        - singleCaseSwitch
        - typeSwitchVar
    govet:
      enable-all: true
      disable:
        - asmdecl
        - assign
        - atomic
        - atomicalign
        - bools
        - buildtag
        - cgocall
        - composites
        - copylocks
        - deepequalerrors
        - errorsas
        - fieldalignment
        - findcall
        - framepointer
        - httpresponse
        - ifaceassert
        - loopclosure
        - lostcancel
        - nilfunc
        - nilness
        - reflectvaluecompare
        - shift
        - shadow
        - sigchanyzer
        - sortslice
        - stdmethods
        - stringintconv
        - structtag
        - testinggoroutine
        - tests
        - unmarshal
        - unreachable
        - unsafeptr
        - unusedwrite
    misspell:
      locale: US
      ignore-rules:
        - cancelling
        - cancelled
    revive:
      severity: error
      rules:
        - name: atomic
        - name: line-length-limit
          arguments:
            - 1200
          severity: error
          disabled: false
        - name: unhandled-error
          severity: warning
          disabled: true
        - name: var-naming
          arguments:
            - - ID
              - URL
              - IP
              - HTTP
              - JSON
              - API
              - UID
              - DB
              - SQL
            - - VM
          severity: warning
          disabled: true
    staticcheck:
      checks:
        - all
        - -S1000
        - -S1008
        - -S1009
        - -S1011
        - -S1016
        - -S1023
        - -S1025
        - -S1029
        - -S1034
        - -S1040
        - -SA1012
        - -SA1016
        - -SA1019
        - -SA1029
        - -SA4006
        - -SA4015
        - -SA5011
        - -SA6003
        - -SA9003
        - -ST1003
        - -ST1011
        - -ST1019
        - -QF1001
        - -QF1002
        - -QF1003
        - -QF1006
        - -QF1007
        - -QF1008
        - -QF1011
        - -QF1012
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - goconst
        path: _test\.go
      - linters:
          - goconst
        text: string `pluginId` has
      - linters:
          - goconst
        text: string `HostServiceJSONRequest` has
      - linters:
          - goconst
        text: string `HostServiceJSONResponse` has
      - linters:
          - revive
        path: _test\.go
        text: context.Context should be the first parameter of a function
    paths:
      - internal/dao$
      - internal/model/do$
      - internal/model/entity$
      - backend/internal/dao$
      - backend/internal/model/do$
      - backend/internal/model/entity$
      - apps/lina-core/internal/dao$
      - apps/lina-core/internal/model/do$
      - apps/lina-core/internal/model/entity$
      - apps/lina-plugins/.*/backend/internal/dao$
      - apps/lina-plugins/.*/backend/internal/model/do$
      - apps/lina-plugins/.*/backend/internal/model/entity$
      - node_modules$
      - temp$

formatters:
  enable:
    - gofmt
  settings:
    gofmt:
      simplify: true
  exclusions:
    generated: lax
    paths:
      - internal/dao$
      - internal/model/do$
      - internal/model/entity$
      - backend/internal/dao$
      - backend/internal/model/do$
      - backend/internal/model/entity$
      - apps/lina-core/internal/dao$
      - apps/lina-core/internal/model/do$
      - apps/lina-core/internal/model/entity$
      - apps/lina-plugins/.*/backend/internal/dao$
      - apps/lina-plugins/.*/backend/internal/model/do$
      - apps/lina-plugins/.*/backend/internal/model/entity$
      - node_modules$
      - temp$
