# Repository-level development and delivery tool configuration.
# 仓库级开发与交付工具配置。

build:
  # Target platforms for host binaries and Docker images.
  # Each item uses goos/goarch form, or "auto" for linux/<current-arch>.
  # 宿主二进制与 Docker 镜像的目标平台列表。
  # 每一项使用 goos/goarch 格式，或使用 "auto" 表示 linux/<当前架构>。
  platforms:
    - "auto"
  # Whether to enable CGO when building the host binary.
  # 构建宿主二进制时是否启用 CGO。
  cgoEnabled: false
  # Standard build output path, relative to the repository root.
  # 标准构建产物路径，相对于仓库根目录。
  outputDir: "temp/output"
  # Host binary filename generated by make build.
  # make build 生成的宿主二进制文件名。
  binaryName: "lina"


image:
  # Default image repository name. A configured registry is prepended at build time.
  # 默认镜像仓库名。构建时会在前面拼接已配置的远端仓库前缀。
  name: "linapro"
  # Optional default tag. Leave empty to derive one from git.
  # 可选默认镜像标签。留空时会根据 git 信息自动推导。
  tag: "dev"
  # Optional remote registry prefix, for example "ghcr.io/linaproai".
  # 可选远端仓库前缀，例如 "ghcr.io/linaproai"。
  registry: ""
  # Default push behavior. Command-line push=1 overrides this for one invocation.
  # 默认是否推送镜像。命令行 push=1 可仅覆盖本次执行。
  push: false
  # Runtime base image used by hack/docker/Dockerfile.
  # hack/docker/Dockerfile 使用的运行时基础镜像。
  baseImage: "alpine:3.22"
  # Dockerfile path, relative to the repository root.
  # Dockerfile 路径，相对于仓库根目录。
  dockerfile: "hack/docker/Dockerfile"


plugins:
  # Named plugin origins for plugins.install / plugins.update / plugins.status.
  # Each key is a user-defined label. type is required: git | marketplace.
  # Git: repo + root + ref (repository-level). Marketplace: url + item versions.
  # items must be mappings {id, version?}; git items must not set version.
  # 命名来源；type 必填。Git 用 repo/root/ref；市场用 url + item.version。
  # items 仅支持 {id, version?}；Git item 不得写 version。
  official:
    type: git
    repo: "https://github.com/linaproai/official-plugins.git"
    root: "."
    ref: "main"
    items:
      - id: linapro-demo-source
      - id: linapro-demo-dynamic
      - id: linapro-content-notice
      - id: linapro-monitor-loginlog
      - id: linapro-monitor-server
      - id: linapro-monitor-online
      - id: linapro-monitor-operlog
      - id: linapro-ai-core
      - id: linapro-org-core
      - id: linapro-tenant-core
  # Example marketplace origin:
  # public-market:
  #   type: marketplace
  #   url: "https://linapro.ai"
  #   items:
  #     - id: linapro-demo-source
  #       version: "v1.0.0"
