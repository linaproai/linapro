# Repository-level development and delivery tool configuration.
# 仓库级开发与交付工具配置。

image:
  # Default image repository name. A configured registry is prepended at build time.
  # 默认镜像仓库名。构建时会在前面拼接已配置的远端仓库前缀。
  name: "linapro"
  # Optional default tag. Leave empty to derive one from git.
  # 可选默认镜像标签。留空时会根据 git 信息自动推导。
  tag: ""
  # Optional remote registry prefix, for example "ghcr.io/linaproai".
  # 可选远端仓库前缀，例如 "ghcr.io/linaproai"。
  registry: ""
  # Default push behavior. Command-line push=1 overrides this for one invocation.
  # 默认是否推送镜像。命令行 push=1 可仅覆盖本次执行。
  push: false
  # Runtime base image used by hack/docker/Dockerfile.
  # hack/docker/Dockerfile 使用的运行时基础镜像。
  baseImage: "alpine:3.22"
  # Target OS and architecture for the host binary and Docker image.
  # 宿主二进制与 Docker 镜像的目标操作系统和架构。
  os: "linux"
  # Target architecture. "auto" follows the local Go architecture.
  # 目标架构。"auto" 表示跟随本机 Go 架构。
  arch: "auto"
  # Docker build platform. "auto" resolves to "<os>/<arch>".
  # Docker 构建平台。"auto" 会解析为 "<os>/<arch>"。
  platform: "auto"
  # Dockerfile path, relative to the repository root.
  # Dockerfile 路径，相对于仓库根目录。
  dockerfile: "hack/docker/Dockerfile"
  # Image build artifact path, relative to the repository root.
  # 镜像构建产物路径，相对于仓库根目录。
  outputDir: "temp/image"
  # Host binary filename copied into the Docker image build context.
  # 复制到 Docker 镜像构建上下文中的宿主二进制文件名。
  binaryName: "lina"
